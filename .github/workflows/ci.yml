name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install python-dotenv

      - name: Run store tests (no API keys needed)
        run: pytest tests/test_stores.py -v

      - name: Syntax check all files
        run: python -c "
          import ast, pathlib, sys
          errors = []
          for f in pathlib.Path('cognis').rglob('*.py'):
              try: ast.parse(f.read_text())
              except SyntaxError as e: errors.append(f'{f}: {e}')
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          print('All files pass syntax check')
          "
